name: fl_clash
description: A multi-platform proxy client based on ClashMeta, simple and easy to use, open-source and ad-free.
publish_to: 'none'
version: 3.3.9
environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  path_provider: ^2.1.0
  path: ^1.9.0
  shared_preferences: ^2.5.3
  window_manager: ^0.5.0
  dynamic_color: 1.7.0
  proxy:
    path: plugins/proxy
  window_ext:
    path: plugins/window_ext
  launch_at_startup: ^0.3.1
  json_annotation: ^4.9.0
  file_picker: ^8.0.7
  mobile_scanner: ^6.0.11
  app_links: ^6.4.0
  win32_registry: ^1.1.3
  tray_manager: ^0.5.0
  collection: ^1.18.0
  animations: ^2.0.11
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.6
  freezed_annotation: ^2.4.1
  image_picker: ^1.1.2
  webdav_client: ^1.2.2
  dio: ^5.8.0+1
  win32: ^5.5.1
  ffi: ^2.1.2
  re_editor:
    git:
      url: https://github.com/reqable/re-editor.git
      ref: 8a7dbc5836f3dfeb2f723e3ed11bd51e325f9c0e  # main (pinned)
  re_highlight: ^0.0.3
  archive: ^3.6.1
  lpinyin: ^2.0.3
  emoji_regex: ^0.0.5
  hotkey_manager: ^0.2.3
  uni_platform: ^0.1.3
  device_info_plus: ^11.2.2
  connectivity_plus: ^6.1.0
  screen_retriever: ^0.2.0
  defer_pointer: ^0.0.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  riverpod: ^2.6.1
  go_router: ^14.6.2
  material_color_utilities: any
  flutter_js:
    git:
      url: https://github.com/abner/flutter_js.git
      ref: c3d4bba92278577c6cc73e7b10a69b358f23768b  # master (pinned)
  yaml: ^3.1.3
  flutter_svg: ^2.1.0
  flutter_cache_manager: ^3.4.1
  cached_network_image: ^3.4.1
  crypto: ^3.0.3
  encrypt: ^5.0.1
  pointycastle: ^3.9.1
  http: ^1.1.0
  flutter_markdown: ^0.7.4+1
  flutter_widget_from_html: ^0.16.1
  uuid: ^4.4.0
  web_socket_channel: ^3.0.3
  qr_flutter: ^4.1.0
  socks5_proxy: ^2.1.1
  webview_flutter: ^4.13.0
  flutter_xboard_sdk:
    path: lib/sdk/flutter_xboard_sdk
  desktop_webview_window: ^0.2.3
  flutter_inappwebview: ^6.1.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.24.0
  flutter_lints: ^5.0.0
  ffigen: ^18.1.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.13
  args: ^2.4.2
  freezed: ^2.5.1
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.0
  intl_utils: ^2.8.11
  mockito: ^5.4.4

dependency_overrides:
  web_socket_channel: ^3.0.3
  test_api: 0.7.9
  matcher: 0.12.18
  
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/data/
    - assets/fonts/
    - assets/images/
    - assets/images/avatars/
    - assets/cer/
    - assets/config/config.yaml
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
    - family: Twemoji
      fonts:
        - asset: assets/fonts/Twemoji.Mozilla.ttf
    - family: Icons
      fonts:
        - asset: assets/fonts/Icons.ttf
ffigen:
  name: "ClashFFI"
  output: 'lib/clash/generated/clash_ffi.dart'
  headers:
    entry-points:
      - 'libclash/android/arm64-v8a/libclash.h'
flutter_intl:
  enabled: true
  class_name: AppLocalizations
  arb_dir: arb
  output_dir: lib/l10n
