name: CI Test
on:
  push:
    tags:
      - "test-*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
      - name: Flutter doctor
        run: flutter doctor -v
      - name: Get packages
        run: flutter pub get
