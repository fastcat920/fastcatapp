name: Build Client

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: Build Android APK
        type: boolean
        default: true
      build_windows:
        description: Build Windows amd64 client
        type: boolean
        default: true
      build_ios:
        description: Build iOS IPA
        type: boolean
        default: true
      build_linux:
        description: Build Linux amd64 packages
        type: boolean
        default: true
      build_macos:
        description: Build macOS Universal DMG (arm64+amd64)
        type: boolean
        default: true
  push:
    tags:
      - "v*"

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.build_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.0.13004108"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Build APK
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
        run: bash scripts/package_apk.sh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fastcat-android-apk
          path: dist/*.apk
          if-no-files-found: error

  windows:
    name: Windows amd64
    runs-on: windows-latest
    if: github.event_name == 'push' || inputs.build_windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"
          cache-dependency-path: core/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Build Windows client
        shell: pwsh
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
        run: dart run setup.dart windows --arch amd64 --out app --env stable


      - name: List dist contents
        shell: pwsh
        if: always()
        run: |
          if (Test-Path dist) {
            Get-ChildItem -Path dist -Recurse | Select-Object FullName, Length
          } else {
            Write-Host "dist/ directory does not exist"
          }
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastcat-windows-amd64
          path: |
            dist/**/*.zip
            dist/**/*.exe
          if-no-files-found: error

  ios:
    name: iOS IPA
    runs-on: macos-latest
    if: github.event_name == 'push' || inputs.build_ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Build IPA
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
        run: bash scripts/package_ipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fastcat-ios-ipa
          path: dist/*.ipa
          if-no-files-found: error

  linux:
    name: Linux amd64
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.build_linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"
          cache-dependency-path: core/go.sum

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libgtk-3-dev \
            liblzma-dev \
            ninja-build \
            pkg-config

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Build Linux packages
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
        run: dart run setup.dart linux --arch amd64 --out app --env stable

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastcat-linux-amd64
          path: |
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
          if-no-files-found: error

  macos:
    name: macOS Universal DMG
    runs-on: macos-latest
    if: github.event_name == 'push' || inputs.build_macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"
          cache-dependency-path: core/go.sum

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Build macOS universal DMG
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
        run: dart run setup.dart macos --arch universal --out app --env stable

      - name: Upload macOS universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: fastcat-macos
          path: dist/*.dmg
          if-no-files-found: error
