name: Build Client

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: Build Android APK
        type: boolean
        default: true
      build_windows:
        description: Build Windows amd64 client
        type: boolean
        default: true
      build_ios:
        description: Build iOS IPA
        type: boolean
        default: true
      build_linux:
        description: Build Linux amd64 packages
        type: boolean
        default: true
      build_macos:
        description: Build macOS Universal DMG (arm64+amd64)
        type: boolean
        default: true
  push:
    tags:
      - "v*"

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.build_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.0.13004108"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Build APK
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
        run: bash scripts/package_apk.sh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fastcat-android-apk
          path: dist/*.apk
          if-no-files-found: error

  windows:
    name: Windows amd64
    runs-on: windows-latest
    if: github.event_name == 'push' || inputs.build_windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"
          cache-dependency-path: core/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Verify Inno Setup
        shell: pwsh
        run: |
          if (Get-Command iscc -ErrorAction SilentlyContinue) {
            Write-Host "Inno Setup found at: $(Get-Command iscc | Select-Object -ExpandProperty Source)"
          } else {
            Write-Host "WARNING: iscc.exe not on PATH"
            Get-ChildItem "C:\Program Files*\Inno Setup*\iscc.exe" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "Found: $($_.FullName)" }
          }

      - name: Link Inno Setup to expected path
        shell: pwsh
        run: |
          $innoDirs = Get-ChildItem "C:\Program Files\Inno Setup*" -Directory -ErrorAction SilentlyContinue
          if ($innoDirs) {
            $target = $innoDirs[0].FullName
            $link = "C:\Program Files (x86)\Inno Setup 6"
            if (-not (Test-Path $link)) {
              New-Item -ItemType Junction -Path $link -Target $target -Force | Out-Null
              Write-Host "Junction created: $link -> $target"
            } else {
              Write-Host "Junction already exists: $link"
            }
            "INNO_SETUP_HOME=$target" >> $env:GITHUB_ENV
          } else {
            Write-Host "No Inno Setup directory found under C:\Program Files"
          }

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Build Windows client
        shell: pwsh
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
        run: dart run setup.dart windows --arch amd64 --out app --env stable

      - name: Build Windows exe installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iscc = Get-Command iscc | Select-Object -ExpandProperty Source
          Write-Host "iscc: $iscc"

          $buildOut = "build\windows\x64\runner\Release"
          if (-not (Test-Path $buildOut)) { throw "Flutter build not found: $buildOut" }

          # Parse make_config.yaml (strip quotes from YAML values)
          $cfg = Get-Content "windows\packaging\exe\make_config.yaml" -Raw
          function yv($k) {
            if ($cfg -match "(?m)^${k}:\s*(.+)$") {
              $v = $matches[1].Trim()
              # Strip surrounding quotes if present (YAML-quoted values)
              if ($v -match '^"(.*)"$' -or $v -match "^'(.*)'$") { $v = $matches[1] }
              return $v
            }
            return ""
          }
          $display = yv "display_name"; if (-not $display) { $display = yv "app_name" }
          $exe    = yv "executable_name"; if (-not $exe) { $exe = "fastcat.exe" }
          $out    = yv "output_base_file_name"; if (-not $out) { $out = $exe }
          $pub    = yv "publisher"
          $pubUrl = yv "publisher_url"
          $icon   = yv "setup_icon_file"
          $appId  = yv "app_id"; if (-not $appId) { $appId = "{" + [guid]::NewGuid() + "}" }

          $ver = "1.0.0"
          $ps = Get-Content "pubspec.yaml" -Raw
          if ($ps -match "(?m)^version:\s*(.+)$") { $ver = ($matches[1] -split '\+')[0].Trim() }

          # Render ISS template
          $iss = (Get-Content "windows\packaging\exe\inno_setup.iss" -Raw) `
            -replace '\{\{APP_ID\}\}', $appId `
            -replace '\{\{APP_VERSION\}\}', $ver `
            -replace '\{\{DISPLAY_NAME\}\}', $display `
            -replace '\{\{PUBLISHER_NAME\}\}', $pub `
            -replace '\{\{PUBLISHER_URL\}\}', $pubUrl `
            -replace '\{\{OUTPUT_BASE_FILENAME\}\}', ([IO.Path]::GetFileNameWithoutExtension($out)) `
            -replace '\{\{EXECUTABLE_NAME\}\}', ([IO.Path]::GetFileName($exe)) `
            -replace '\{\{SETUP_ICON_FILE\}\}', $icon `
            -replace '\{\{SOURCE_DIR\}\}', $buildOut `
            -replace '\{\{PRIVILEGES_REQUIRED\}\}', "admin" `
            -replace '\{\{ARCH\}\}', "x64" `
            -replace '\{\{CREATE_DESKTOP_ICON\}\}', "true"

          # Replace locale template loop with en+zh
          $nl = [Environment]::NewLine
          $locales = 'Name: "english"; MessagesFile: "compiler:Default.isl"' + $nl +
                     'Name: "chineseSimplified"; MessagesFile: "..\\windows\\packaging\\exe\\ChineseSimplified.isl"'
          $iss = $iss -replace '(?s)\{% for locale in LOCALES %\}.*?\{% endfor %\}', $locales
          # Replace CREATE_DESKTOP_ICON conditional with checkedonce
          $iss = $iss -replace '\{% if CREATE_DESKTOP_ICON != true %\}unchecked\{% else %\}checkedonce\{% endif %\}', 'checkedonce'
          # Replace PRIVILEGES_REQUIRED conditional with runascurrentuser
          $iss = $iss -replace '\{% if PRIVILEGES_REQUIRED == .admin. %\}runascurrentuser\{% endif %\}', 'runascurrentuser'
          # Clean up any remaining template tags
          $iss = $iss -replace '\{%[^%]*%\}', ''
          $iss = $iss -replace '\{\{[^}]*\}\}', ''

          $issFile = "build\setup.iss"
          New-Item -Force -ItemType Directory (Split-Path $issFile) | Out-Null
          [IO.File]::WriteAllText((Resolve-Path ".").Path + "\" + $issFile, $iss)
          Write-Host "ISS written to $issFile"

          & $iscc $issFile
          if ($LASTEXITCODE -ne 0) { throw "iscc failed: $LASTEXITCODE" }

          # Find and copy exe
          $exeFile = Join-Path (Split-Path $issFile -Parent) "$out"
          if (-not (Test-Path $exeFile)) {
            $exeFile = Join-Path (Get-Location) "$out"
          }
          if (-not (Test-Path $exeFile)) {
            $found = Get-ChildItem -Recurse -Filter "$out" -ErrorAction SilentlyContinue | Select -First 1
            if ($found) { $exeFile = $found.FullName }
          }
          if (Test-Path $exeFile) {
            New-Item -Force -ItemType Directory dist | Out-Null
            Copy-Item $exeFile dist\ -Force
            Write-Host "Exe copied to dist/"
          } else {
            Write-Host "WARNING: exe not found, searching..."
            Get-ChildItem -Recurse -Filter *.exe -ErrorAction SilentlyContinue | Select FullName, Length | ft -AutoSize
            throw "Exe file not produced"
          }

      - name: List dist contents
        shell: pwsh
        if: always()
        run: |
          Write-Host "=== dist/ ==="
          if (Test-Path dist) { Get-ChildItem dist -Recurse | Select FullName, Length }
          else { Write-Host "dist/ absent" }
          Write-Host "=== all .exe .zip ==="
          Get-ChildItem . -Recurse -Include *.zip,*.exe -ErrorAction SilentlyContinue | Select FullName, Length

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastcat-windows-amd64
          path: dist/**
          if-no-files-found: error

  ios:
    name: iOS IPA
    runs-on: macos-latest
    if: github.event_name == 'push' || inputs.build_ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Build IPA
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
        run: bash scripts/package_ipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fastcat-ios-ipa
          path: dist/*.ipa
          if-no-files-found: error

  linux:
    name: Linux amd64
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.build_linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"
          cache-dependency-path: core/go.sum

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libgtk-3-dev \
            liblzma-dev \
            libwebkit2gtk-4.1-dev \
            ninja-build \
            pkg-config

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Build Linux packages
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
        run: dart run setup.dart linux --arch amd64 --out app --env stable

      - name: List dist contents
        shell: bash
        if: always()
        run: |
          if [ -d dist ]; then
            find dist -type f -exec ls -lh {} \;
          else
            echo "dist/ directory does not exist"
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastcat-linux-amd64
          path: dist/**
          if-no-files-found: error

  macos:
    name: macOS Universal DMG
    runs-on: macos-latest
    if: github.event_name == 'push' || inputs.build_macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"
          cache-dependency-path: core/go.sum

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Build macOS universal DMG
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
        run: dart run setup.dart macos --arch universal --out app --env stable

      - name: Upload macOS universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: fastcat-macos
          path: dist/*.dmg
          if-no-files-found: error
